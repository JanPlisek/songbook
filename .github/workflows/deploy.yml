name: Automaticke nahrani na FTP (Zpevnik)

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Nahrani-na-FTP
    runs-on: ubuntu-latest
    steps:
    - name: Stahnout kod
      uses: actions/checkout@v4

    - name: Synchronizace souboru
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ftp.plisek.cz
        username: plisek
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /web/zpevnik/
        exclude: |
          **/.git*
          **/.git*/**
          **/.vscode/**
          **/.github/**
          uploads/**
          config.php
